name: Terraform Test

on:
  workflow_call:
    inputs:
      test_directory:
        description: Directory containing Terraform test files
        required: false
        type: string
        default: tests

permissions:
  contents: read

jobs:
  test:
    name: Terraform Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Terraform min/max versions
        id: minMax
        uses: clowdhaus/terraform-min-max@5e40f8cf535d84fbd031571abd363ffd81dbfbfc # v3.0.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v3.2.0
        with:
          terraform_version: ${{ steps.minMax.outputs.maxVersion }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Test
        env:
          TEST_DIRECTORY: ${{ inputs.test_directory }}
        run: terraform test -test-directory="$TEST_DIRECTORY"
