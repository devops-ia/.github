name: Terraform Test

on:
  workflow_call:
    inputs:
      test_directory:
        description: Directory containing Terraform test files
        required: false
        type: string
        default: tests

permissions:
  contents: read

jobs:
  test:
    name: Terraform Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Terraform min/max versions
        id: minMax
        uses: clowdhaus/terraform-min-max@5e40f8cf535d84fbd031571abd363ffd81dbfbfc # v3.0.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v3.2.0
        with:
          terraform_version: ${{ steps.minMax.outputs.maxVersion }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Test
        env:
          TEST_DIRECTORY: ${{ inputs.test_directory }}
        run: terraform test -test-directory="$TEST_DIRECTORY"
