name: Lint and Test Helm Charts

on:
  workflow_call:
    inputs:
      ct_config:
        description: Path to chart-testing config file
        required: false
        type: string
        default: .github/ct.yaml
      yamale_version:
        description: Yamale version for chart-testing
        required: false
        type: string
        default: "6.0.0"
      helm_extra_args:
        description: Extra arguments passed to helm install
        required: false
        type: string
        default: "--timeout 900s --debug"

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          yamale_version: ${{ inputs.yamale_version }}

      - name: Run chart-testing (list-changed)
        id: list-changed
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
        run: |
          changed=$(ct list-changed --config "$CT_CONFIG")
          if [[ -n "${changed}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
        run: ct lint --config "$CT_CONFIG"

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run ct install
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
          HELM_EXTRA_ARGS: ${{ inputs.helm_extra_args }}
        run: ct install --config "$CT_CONFIG" --helm-extra-args "$HELM_EXTRA_ARGS"

      - name: "(workflow_dispatch) Run ct install"
        if: github.event_name == 'workflow_dispatch'
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
          HELM_EXTRA_ARGS: ${{ inputs.helm_extra_args }}
        run: ct install --config "$CT_CONFIG" --helm-extra-args "$HELM_EXTRA_ARGS" --all
