name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      dockerhub_user:
        description: DockerHub username/organization
        required: false
        type: string
        default: devopsiaci
      dockerhub_repo:
        description: DockerHub repository name
        required: true
        type: string
      image_title:
        description: OCI image title label
        required: false
        type: string
        default: ""
      image_description:
        description: OCI image description label
        required: false
        type: string
        default: ""
      image_authors:
        description: OCI image authors label
        required: false
        type: string
        default: ialejandro
      platforms:
        description: Target build platforms (comma-separated)
        required: false
        type: string
        default: linux/amd64,linux/arm64
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

permissions:
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ inputs.dockerhub_user }}/${{ inputs.dockerhub_repo }}
            ghcr.io/${{ github.repository }}
          labels: |
            org.opencontainers.image.authors=${{ inputs.image_authors }}
            org.opencontainers.image.description=${{ inputs.image_description }}
            org.opencontainers.image.maintainer=${{ inputs.image_authors }}
            org.opencontainers.image.title=${{ inputs.image_title || inputs.dockerhub_repo }}
            org.opencontainers.image.vendor=DevOps IA
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=sha,enable=false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: "[DOCKERHUB] Log in to Docker Hub"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: "[GHCR] Log in to the Container registry"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: "[DOCKERHUB] Update Docker registry description"
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ inputs.dockerhub_user }}/${{ inputs.dockerhub_repo }}

      - name: "[GHCR] Generate artifact attestation"
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

