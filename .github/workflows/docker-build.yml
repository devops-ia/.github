name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      dockerhub_user:
        description: DockerHub username/organization
        required: false
        type: string
        default: devopsiaci
      dockerhub_repo:
        description: DockerHub repository name
        required: true
        type: string
      image_title:
        description: OCI image title label
        required: false
        type: string
        default: ""
      image_description:
        description: OCI image description label
        required: false
        type: string
        default: ""
      image_authors:
        description: OCI image authors label
        required: false
        type: string
        default: ialejandro
      platforms:
        description: Target build platforms (comma-separated)
        required: false
        type: string
        default: linux/amd64,linux/arm64
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

permissions:
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ inputs.dockerhub_user }}/${{ inputs.dockerhub_repo }}
            ghcr.io/${{ github.repository }}
          labels: |
            org.opencontainers.image.authors=${{ inputs.image_authors }}
            org.opencontainers.image.description=${{ inputs.image_description }}
            org.opencontainers.image.maintainer=${{ inputs.image_authors }}
            org.opencontainers.image.title=${{ inputs.image_title || inputs.dockerhub_repo }}
            org.opencontainers.image.vendor=DevOps IA
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=sha,enable=false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: "[DOCKERHUB] Log in to Docker Hub"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: "[GHCR] Log in to the Container registry"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: "[DOCKERHUB] Update Docker registry description"
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ inputs.dockerhub_user }}/${{ inputs.dockerhub_repo }}

      - name: "[GHCR] Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

